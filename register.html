<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Community Portal</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase Scripts (Yeh zaroori hain) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join our community today</p>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your name" required>
                </div>
                
                <div class="input-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" required>
                </div>
                
                <button type="submit" class="auth-btn">Register</button>
            </form>
            
            <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
