<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Community Portal</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase Scripts (Yeh zaroori hain) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Login to your account to post blogs</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="auth-btn">Login</button>
                <!-- Login form ke andar login button ke niche ise dalein -->
                <div class="forgot-password-container" style="margin-top: 15px; text-align: center;">
                    <a href="#" id="forgotPasswordBtn"
                        style="color: #4A90E2; text-decoration: none; font-size: 14px;">Forgot Password?</a>
                </div>
            </form>

            <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
