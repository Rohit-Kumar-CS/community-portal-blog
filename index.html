<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOICT Community Blog Portal</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">SOICT<span> Community</span></div>
        <nav class="nav-links" id="navLinks">
        </nav>
    </header>

<section class="hero-section">
    <div class="hero-content">
        <h1>Welcome to Our Community Blog</h1>
        <p>Share your thoughts, ideas, and stories with the world.</p>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchBar" placeholder="Search blogs by title...">
    </div>
</section>

    <main class="container">
        <div class="blog-grid" id="blogGrid">
        </div>
    </main>

    <div class="modal-overlay" id="postModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Create New Blog Post</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="createPostForm">
                <div class="input-group">
                    <label for="postTitle">Blog Title</label>
                    <input type="text" id="postTitle" placeholder="Enter an catchy title" required>
                </div>
                <div class="input-group">
                    <label for="postImage">Image URL</label>
                    <input type="url" id="postImage" placeholder="Paste image link (e.g. https://images.unsplash.com/...)" required>
                </div>
                
                <div class="input-group">
                    <label>Blog Content</label>
                    <div id="editor" style="height: 220px; background: white; border-radius: 0 0 6px 6px;"></div>
                </div>
                
                <button type="submit" class="auth-btn">Publish Blog</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
