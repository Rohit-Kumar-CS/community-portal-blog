<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Detail - SOICT Community Portal</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
   .navbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 70px !important;
            /* 🌟 Transparent Background Layer with Glass Effect */
            background-color: rgba(27, 27, 31, 0) !important;
            -webkit-backdrop-filter: blur(240px) !important;
            backdrop-filter: blur(20px) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 0 40px !important;
            z-index: 99999 !important;
            box-sizing: border-box !important;
            /* Sleek border matching the transparent look */
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        }
        .logo {
            font-size: 22px !important;
            font-weight: 700 !important;
            color: var(--white, #FFFFFF) !important;
            letter-spacing: -0.5px !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            gap: 4px !important;
            flex: 1 !important;
            /* Left side block fixed constraint */
        }

        .logo span {
            font-weight: 700 !important;
            background: linear-gradient(135deg, var(--indigo, #524BC4), var(--purple, #8A57E8)) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
        }

         .nav-btn {
            font-size: 14px !important;
            font-weight: 600 !important;
            padding: 10px 22px !important;
            border-radius: 12px !important;
            cursor: pointer !important;
            text-decoration: none !important;
            display: inline-block !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease !important;
        }

        .login-nav-btn{
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: var(--white, #FFFFFF) !important;
            box-shadow: none !important;
        }

        .login-nav-btn:hover {
            background: rgba(255, 255, 255, 0.12) !important;
            border-color: var(--purple, #8A57E8) !important;
            transform: scale(1.05) !important;
        }
    </style>

</head>

<body>

    <header class="navbar">
        <div class="logo">SOICT<span> Community</span></div>
        <nav class="nav-links" id="detailNavLinks" style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" class="nav-btn login-nav-btn">Back to Home</a>
        </nav>
    </header>

    <main class="container detail-container">
        <article class="full-blog" id="fullBlogContent">
            <p class="loading">Loading blog content...</p>
        </article>
    </main>

    <script>
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const blogId = urlParams.get('id');

            // FIREBASE CONFIGURATION (ROHIT'S REAL CONFIG)
            const firebaseConfig = {
                apiKey: "AIzaSyDjNWBilhKpj8RNHjsC5MDXy-ep-Xbs7GQ",
                authDomain: "community-portal-blog.firebaseapp.com",
                projectId: "community-portal-blog",
                storageBucket: "community-portal-blog.firebasestorage.app",
                messagingSenderId: "1023990335036",
                appId: "1:1023990335036:web:1d03b00147d61a0feea539",
                measurementId: "G-N03RZX09YH"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const fullBlogContent = document.getElementById('fullBlogContent');

            // Firestore se specifically document fetch karein uski dynamic ID se
            db.collection("blogs").doc(blogId).get().then((doc) => {
                if (doc.exists) {
                    const blog = doc.data();

                    // UPDATED LOGIC: Text ko real HTML paragraphs me convert karne ke liye
                    const formattedContent = blog.content
                        .split('\n\n') // Double enter marne par naya paragraph banega
                        .map(para => `<p>${para.replace(/\n/g, '<br>')}</p>`) // Single enter par line break ho jayega
                        .join('');

                    fullBlogContent.innerHTML = `
                <h1 class="detail-title">${blog.title}</h1>
                <div class="detail-meta">
                    <span>By <strong>${blog.author}</strong></span> | 
                    <span>Published on ${blog.date}</span>
                </div>
                <img src="${blog.image}" alt="${blog.title}" class="detail-img">
                <div class="detail-text">
                    ${formattedContent}
                </div>
            `;
                } else {
                    fullBlogContent.innerHTML = `<h2>Blog not found!</h2><a href="index.html">Back to Home</a>`;
                }
            }).catch(err => {
                fullBlogContent.innerHTML = `<h2>Error loading blog content.</h2>`;
            });
        }


    </script>
</body>

</html>
