<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Desktop view me dropdown button ko hidden rakho */
        .menu-toggle {
            display: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--white, #FFFFFF);
            user-select: none;
        }

        /* 📱 Responsive Mobile Breakpoint (768px ya usse choti screen) */
        @media (max-width: 768px) {
            .navbar {
                position: relative;
                /* Dropdown ki positioning coordinate karne ke liye */
            }

            /* Mobile par 🍔 button ko show karo */
            .menu-toggle {
                display: block;
            }

            /* Normal horizontal menu ko vertical absolute dropdown card me badlo */
            .nav-links-ul {
                display: none;
                /* Default state: Closed */
                flex-direction: column !important;
                position: absolute;
                top: 100%;
                /* Navbar ke theek niche automatic chipkega */
                left: 0;
                width: 100%;
                background-color: #1B1B1F;
                /* Premium dark background */
                padding: 20px !important;
                box-sizing: border-box;
                border-bottom: 2px solid var(--purple, #8A57E8);
                z-index: 9999;
                gap: 15px;
                margin: 0;
                list-style: none;
            }

            /* Jab JavaScript se '.show' class add hogi, tab dropdown khulega */
            .nav-links-ul.show {
                display: flex !important;
            }

            /* Mobile links adjustments for easy click/touch */
            .nav-links-ul li {
                width: 100%;
            }

            .nav-links-ul li a {
                display: block;
                padding: 10px 5px;
                color: var(--light-gray, #E0DFE3);
                text-decoration: none;
                font-size: 16px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .nav-links-ul li a:hover {
                color: var(--purple, #8A57E8);
            }
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">SOICT<span> Community</span></div>

        <div class="menu-toggle" id="menuToggle">☰</div>

        <ul class="nav-links-ul" id="navLinks">
            <li><a href="/team-section.html" class="nav-link">Home</a></li>
            <li><a href="#" class="nav-link">Information Technology</a></li>
            <li><a href="#" class="nav-link">Events</a></li>
            <li><a href="#" class="nav-link">Opportunities</a></li>
            <li><a href="#" class="nav-link">Blogs</a></li>
            <li><a href="#" class="nav-link">Team</a></li>
            <li><a href="#" class="nav-link">Resources</a></li>
        </ul>
    </header>





    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');

            if (menuToggle && navLinks) {
                // 🍔 Hamburger Icon par click hone par toggle logic
                menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation(); // Click event ko window par bubble hone se rokne ke liye
                    navLinks.classList.toggle('show');
                });

                // 🌫️ Safe Close Fix: Agar menu khula ho aur user outside screen par click kare, toh close ho jaye
                document.addEventListener('click', (e) => {
                    if (!navLinks.contains(e.target) && e.target !== menuToggle) {
                        navLinks.classList.remove('show');
                    }
                });
            }
        });
    </script>
</body>

</html>
